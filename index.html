<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaceArchitect | 3D Scanner [FIXED]</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- MediaPipe with proper loading -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d4ff;
            --error: #ff4444;
            --bg: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        .step {
            position: absolute;
            inset: 0;
            display: none;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .step.active {
            display: flex;
            flex-direction: column;
            opacity: 1;
        }

        /* Landing */
        #step-landing {
            align-items: center;
            justify-content: center;
            text-align: center;
            background: radial-gradient(circle at center, rgba(0,212,255,0.1), transparent 70%);
        }

        .brand {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.875rem;
            letter-spacing: 0.3em;
            color: var(--primary);
            margin-bottom: 2rem;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 300;
            margin-bottom: 1rem;
        }

        h1 span { color: var(--primary); font-weight: 700; }

        .subtitle {
            color: rgba(255,255,255,0.6);
            max-width: 500px;
            margin-bottom: 3rem;
            line-height: 1.6;
        }

        .btn-primary {
            background: white;
            color: black;
            border: none;
            padding: 1.25rem 3rem;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.875rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 100px;
            transition: all 0.3s;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0,212,255,0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Scanner */
        #step-scan {
            background: #000;
            position: relative;
        }

        .scanner-ui {
            position: absolute;
            top: 2rem;
            left: 2rem;
            right: 2rem;
            display: flex;
            justify-content: space-between;
            z-index: 100;
            pointer-events: none;
        }

        .scanner-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            letter-spacing: 0.2em;
        }

        .status-box {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.875rem;
            color: rgba(255,255,255,0.6);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #333;
            position: relative;
        }

        .status-dot.active {
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
            animation: pulse 2s infinite;
        }

        .status-dot.error {
            background: var(--error);
            box-shadow: 0 0 10px var(--error);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        #three-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Video element - MUST be visible for MediaPipe in some browsers */
        #input-video {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 160px;
            height: 120px;
            opacity: 0.3;
            z-index: 50;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            transform: scaleX(-1);
            display: none; /* Hidden until active */
        }

        #input-video.active {
            display: block;
        }

        /* Center Instructions */
        .center-instruction {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            background: rgba(0,0,0,0.8);
            padding: 2rem 3rem;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            max-width: 400px;
        }

        .instruction-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            color: var(--primary);
        }

        .instruction-text {
            color: rgba(255,255,255,0.6);
            font-size: 0.875rem;
            line-height: 1.5;
        }

        .error-message {
            color: var(--error);
            margin-top: 1rem;
            font-size: 0.875rem;
            display: none;
        }

        .error-message.visible {
            display: block;
        }

        .retry-btn {
            margin-top: 1.5rem;
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 0.75rem 1.5rem;
            border-radius: 100px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.875rem;
            transition: all 0.3s;
        }

        .retry-btn:hover {
            background: var(--primary);
            color: black;
        }

        /* Progress at bottom */
        .scan-progress {
            position: absolute;
            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            max-width: 80vw;
            z-index: 100;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.875rem;
            letter-spacing: 0.1em;
        }

        .progress-phase {
            color: var(--primary);
        }

        .progress-percent {
            color: white;
            font-variant-numeric: tabular-nums;
        }

        .progress-bar-bg {
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.3s linear;
            box-shadow: 0 0 10px var(--primary);
        }

        /* Results */
        #step-results {
            overflow-y: auto;
            padding: 4rem 2rem;
        }

        .results-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .results-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
        }

        @media (max-width: 768px) {
            .results-grid { grid-template-columns: 1fr; }
        }

        .preview-box {
            background: rgba(255,255,255,0.03);
            border-radius: 24px;
            height: 500px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .metric-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 1.5rem;
            border-radius: 16px;
            margin-bottom: 1rem;
        }

        .metric-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .metric-bar {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .metric-fill {
            height: 100%;
            width: 0%;
            background: var(--primary);
            transition: width 1s ease;
        }
    </style>
</head>
<body>

    <!-- STEP 1: Landing -->
    <div class="step active" id="step-landing">
        <div class="brand">FACEARCHITECT // 3D RECONSTRUCTION</div>
        <h1>3D Biometric <span>Scanning</span></h1>
        <p class="subtitle">
            Real-time point cloud generation using 468 facial landmarks.
            Requires camera access.
        </p>
        <button class="btn-primary" id="start-btn" onclick="initializeScanner()">
            Initialize Scanner
        </button>
    </div>

    <!-- STEP 2: Scanner -->
    <div class="step" id="step-scan">
        <div class="scanner-ui">
            <div class="scanner-title">3D RECONSTRUCTION</div>
            <div class="status-box">
                <span id="status-text">Standby</span>
                <div class="status-dot" id="status-indicator"></div>
            </div>
        </div>

        <canvas id="three-canvas"></canvas>

        <!-- Video MUST be in DOM for MediaPipe -->
        <video id="input-video" playsinline muted></video>

        <div class="center-instruction" id="instruction-panel">
            <div class="instruction-title" id="inst-title">Initializing Camera...</div>
            <div class="instruction-text" id="inst-text">
                Please allow camera access when prompted.
            </div>
            <div class="error-message" id="error-text"></div>
            <button class="retry-btn" id="retry-btn" onclick="retryCamera()" style="display: none;">
                Retry Camera
            </button>
        </div>

        <div class="scan-progress" id="progress-panel" style="display: none;">
            <div class="progress-text">
                <span class="progress-phase" id="phase-text">CALIBRATING</span>
                <span class="progress-percent" id="percent-text">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-fill"></div>
            </div>
        </div>
    </div>

    <!-- STEP 3: Results -->
    <div class="step" id="step-results">
        <div class="results-container">
            <div class="results-header">
                <h2 style="font-family: 'Space Grotesk'; font-size: 2rem;">3D Analysis Complete</h2>
            </div>
            <div class="results-grid">
                <div class="preview-box" id="preview-container"></div>
                <div>
                    <div class="metric-card">
                        <div class="metric-header">
                            <span>Symmetry Index</span>
                            <span id="score-sym">0%</span>
                        </div>
                        <div class="metric-bar">
                            <div class="metric-fill" id="bar-sym"></div>
                        </div>
                    </div>
                    <button class="btn-primary" onclick="location.reload()" style="margin-top: 2rem;">
                        New Scan
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global state
        let scene, camera, renderer, faceMesh, points;
        let isScanning = false;
        let scanProgress = 0;
        let animationId;

        // Initialize everything
        function initializeScanner() {
            document.getElementById('start-btn').disabled = true;
            document.getElementById('start-btn').textContent = 'Loading...';

            showStep('step-scan');

            // Initialize Three.js first
            initThreeJS();

            // Initialize camera with delay to ensure DOM is ready
            setTimeout(() => {
                initCamera();
            }, 500);
        }

        function showStep(stepId) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById(stepId).classList.add('active');
        }

        function initThreeJS() {
            const canvas = document.getElementById('three-canvas');

            // Scene setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 30;

            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            // Create empty point cloud
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(468 * 3);

            // Initialize with random positions for visual effect
            for(let i = 0; i < 468; i++) {
                positions[i*3] = (Math.random() - 0.5) * 10;
                positions[i*3+1] = (Math.random() - 0.5) * 10;
                positions[i*3+2] = (Math.random() - 0.5) * 10;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const material = new THREE.PointsMaterial({
                color: 0x00d4ff,
                size: 0.5,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });

            points = new THREE.Points(geometry, material);
            scene.add(points);

            // Ambient particles
            const particlesGeo = new THREE.BufferGeometry();
            const particlesCount = 500;
            const posArray = new Float32Array(particlesCount * 3);
            for(let i = 0; i < particlesCount * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 50;
            }
            particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const particlesMat = new THREE.PointsMaterial({
                color: 0x444444,
                size: 0.05,
                transparent: true,
                opacity: 0.5
            });
            const particles = new THREE.Points(particlesGeo, particlesMat);
            scene.add(particles);

            // Animation loop
            function animate() {
                animationId = requestAnimationFrame(animate);

                if(!isScanning) {
                    points.rotation.y += 0.002;
                } else {
                    // Smooth follow
                    points.rotation.y += (0 - points.rotation.y) * 0.05;
                }

                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        async function initCamera() {
            const video = document.getElementById('input-video');
            const statusText = document.getElementById('status-text');
            const statusDot = document.getElementById('status-indicator');
            const instTitle = document.getElementById('inst-title');
            const instText = document.getElementById('inst-text');
            const errorText = document.getElementById('error-text');
            const retryBtn = document.getElementById('retry-btn');

            statusText.textContent = 'Requesting camera...';

            try {
                // Method 1: Try native getUserMedia first (most reliable)
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        facingMode: "user"
                    },
                    audio: false
                });

                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    console.log('Camera started successfully');
                    startFaceTracking();
                };

                video.classList.add('active');
                statusText.textContent = 'Camera active';
                statusDot.classList.add('active');
                instTitle.textContent = 'Position Your Face';
                instText.textContent = 'Center your face in the frame. 3D scanning will begin automatically.';

            } catch (err) {
                console.error('Camera error:', err);
                statusText.textContent = 'Camera failed';
                statusDot.classList.add('error');
                instTitle.textContent = 'Camera Access Denied';
                instText.textContent = 'Please check your camera permissions and try again.';
                errorText.textContent = err.message;
                errorText.classList.add('visible');
                retryBtn.style.display = 'inline-block';
            }
        }

        function retryCamera() {
            document.getElementById('error-text').classList.remove('visible');
            document.getElementById('retry-btn').style.display = 'none';
            document.getElementById('inst-title').textContent = 'Retrying...';
            initCamera();
        }

        function startFaceTracking() {
            const video = document.getElementById('input-video');

            // Check if MediaPipe loaded
            if (typeof FaceMesh === 'undefined') {
                console.error('MediaPipe not loaded');
                loadMediaPipeScript().then(() => {
                    setupFaceMesh(video);
                });
            } else {
                setupFaceMesh(video);
            }
        }

        function loadMediaPipeScript() {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js';
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        function setupFaceMesh(video) {
            faceMesh = new FaceMesh({locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
            }});

            faceMesh.setOptions({
                maxNumFaces: 1,
                refineLandmarks: true,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            faceMesh.onResults((results) => {
                if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                    const landmarks = results.multiFaceLandmarks[0];
                    updatePointCloud(landmarks);

                    if (!isScanning) {
                        beginScanningSequence();
                    }
                }
            });

            // Process frames manually using requestAnimationFrame
            // This is more reliable than Camera utility
            processVideoFrame();
        }

        async function processVideoFrame() {
            const video = document.getElementById('input-video');

            if (!video.paused && !video.ended) {
                await faceMesh.send({image: video});
            }

            requestAnimationFrame(processVideoFrame);
        }

        function updatePointCloud(landmarks) {
            if (!points) return;

            const positions = points.geometry.attributes.position.array;
            const nose = landmarks[1];

            // Update points relative to nose center
            for (let i = 0; i < 468; i++) {
                const lm = landmarks[i];
                const x = (lm.x - nose.x) * 40;
                const y = (nose.y - lm.y) * 40; // Invert Y
                const z = estimateDepth(i, lm, landmarks);

                // Smooth lerp for stability
                positions[i*3] += (x - positions[i*3]) * 0.2;
                positions[i*3+1] += (y - positions[i*3+1]) * 0.2;
                positions[i*3+2] += (z - positions[i*3+2]) * 0.2;
            }

            points.geometry.attributes.position.needsUpdate = true;
        }

        function estimateDepth(index, point, allPoints) {
            // Simple depth estimation based on facial features
            const nose = allPoints[1];
            const leftCheek = allPoints[234];
            const rightCheek = allPoints[454];

            // Distance from nose center in 2D plane
            const dist = Math.sqrt(
                Math.pow(point.x - nose.x, 2) +
                Math.pow(point.y - nose.y, 2)
            );

            // Nose tip is front (0), edges are back
            return -dist * 3;
        }

        function beginScanningSequence() {
            isScanning = true;

            // Hide instructions
            gsap.to('#instruction-panel', { opacity: 0, duration: 0.5, onComplete: () => {
                document.getElementById('instruction-panel').style.display = 'none';
                document.getElementById('progress-panel').style.display = 'block';
            }});

            // Simulate scanning phases
            const phases = [
                { name: 'MAPPING LANDMARKS', duration: 3000 },
                { name: 'CALCULATING DEPTH', duration: 3000 },
                { name: 'BUILDING MESH', duration: 3000 },
                { name: 'FINALIZING', duration: 2000 }
            ];

            let currentPhase = 0;
            let totalProgress = 0;

            function nextPhase() {
                if (currentPhase >= phases.length) {
                    completeScan();
                    return;
                }

                const phase = phases[currentPhase];
                document.getElementById('phase-text').textContent = phase.name;

                const interval = setInterval(() => {
                    totalProgress += (100 / phases.length) / (phase.duration / 50);
                    if (totalProgress >= (currentPhase + 1) * (100 / phases.length)) {
                        totalProgress = (currentPhase + 1) * (100 / phases.length);
                        clearInterval(interval);
                        currentPhase++;
                        nextPhase();
                    }

                    document.getElementById('progress-fill').style.width = totalProgress + '%';
                    document.getElementById('percent-text').textContent = Math.floor(totalProgress) + '%';
                }, 50);
            }

            nextPhase();
        }

        function completeScan() {
            setTimeout(() => {
                showStep('step-results');

                // Animate metric
                let score = 0;
                const interval = setInterval(() => {
                    score += 2;
                    if (score >= 94) {
                        score = 94;
                        clearInterval(interval);
                    }
                    document.getElementById('score-sym').textContent = score + '%';
                    document.getElementById('bar-sym').style.width = score + '%';
                }, 30);

            }, 500);
        }
    </script>
</body>
</html>
